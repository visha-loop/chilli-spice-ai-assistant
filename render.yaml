services:
  - type: web
    name: chilli-spice-ai-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CHILLI_SPICE_ADMIN_USERNAME
        sync: false
      - key: CHILLI_SPICE_ADMIN_PASSWORD
        sync: false
